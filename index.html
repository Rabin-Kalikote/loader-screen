<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson Loading — Micro-Lesson Loading Screen</title>
  <!-- Bootstrap CSS (no SRI to avoid integrity mismatch during local dev) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container py-5" id="app">
      <header class="d-flex align-items-center mb-4">
        <img src="https://static.wixstatic.com/media/2cfa2c_1f223e7dd1744bbc9c8a6f8cd55435ee~mv2.png/v1/fill/w_172,h_112,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/SR1%20white.png" alt="Brand" class="brand-img me-3" />
        <h2 class="m-0">Python Programming: Loops</h2>
      </header>

      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm mb-4">
            <div class="card-body p-3">
                <!-- Video lazy-loader skeleton -->
                <div id="video" class="video-skeleton" role="img" aria-label="Video loading placeholder">
                    <div class="skeleton-shimmer"></div>
                    <div class="loader-icon" aria-hidden="true"><i class="fa-solid fa-play fa-3x"></i></div>
                    <!-- video loading icon (top-right) -->
                    <div class="video-loading" aria-hidden="true"><i class="fa-solid fa-circle-notch fa-spin fa-xl"></i></div>
                    <!-- inline facts inside the video skeleton -->
                    <div id="facts" class="video-facts" aria-live="polite">
                      <h5 class="h6 video-facts-title">Did you know?</h5>
                      <div class="fact" id="fact-text"></div>
                    </div>
                  </div>
            </div>
          </div>

          <!-- facts are now embedded inside the video skeleton -->
        </div>
      </div>

    </main>

    <!-- Bootstrap JS (optional components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
